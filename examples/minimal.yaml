project_name: minimal-ui-automation
package_name: com.generated.minimalqa
output_dir: selenium-testng-framework-output

environments:
  dev:
    base_url: https://example.com
  qa:
    base_url: https://example.com

browsers:
  - chrome

headless_default: true

parallel:
  enabled: false
  thread_count: 1

pages:
  - name: HomePage
    path: /
    elements:
      - name: heading
        by: css
        value: h1

flows:
  - name: SmokeTest
    groups: [smoke]
    steps:
      - open: HomePage
      - assert_title_contains: Example Domain
